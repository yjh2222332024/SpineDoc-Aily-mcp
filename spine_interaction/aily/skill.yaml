
#  SpineDoc Aily Skill Definition
# ==================================
# 职责：描述 AI 如何调度 SpineDoc 的核心能力。

name: SpineDoc_Logic_Assassin
description: "专业的长文档逻辑审计工具。能够识别合同矛盾、法律风险和学术逻辑冲突，并生成带有证据链的飞书互动卡片报告。"

#  技能工具集 (Tools)
tools:
  - name: audit_logic
    description: "对上传的文件或飞书云端文档执行逻辑一致性质询。"
    parameters:
      type: object
      properties:
        file_path:
          type: string
          description: "文件路径或飞书文档 URL (例如: https://xxx.feishu.cn/docx/xxx)"
        query:
          type: string
          description: "需要审计的具体逻辑问题 (例如: 检查该合同是否存在违约金计算冲突)"
        chat_id:
          type: string
          description: "当前会话的 chat_id，用于结果投射"
      required: [file_path, query, chat_id]
    
    #  调度指令 (Execution Guide)
    # Aily 在调度此工具时，应通过系统 shell 执行以下命令：
    command_template: >
      python spine_interaction/cli_adapters/audit_entry.py audit 
      --file "{{file_path}}" 
      --query "{{query}}" 
      --chat-id "{{chat_id}}"

#  交互规范 (Interaction Rules)
interaction:
  - 过程透明：系统会自动投射带有进度时间线的互动卡片。
  - 证据导向：所有结论必须在卡片中附带物理页码。
  - 闭环审计：如果发现逻辑冲突，卡片将显示红色高亮并提供裁决理由。
