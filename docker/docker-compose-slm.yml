# ===========================================
# SpineDoc SLM 服务配置 (Qwen2.5-1.5B)
# 🚀 复用 GLM-OCR 的镜像，不需要重新拉取！
# ===========================================

services:
  # ===========================================
  # Qwen2.5-1.5B SLM 服务
  # 使用与 GLM-OCR 相同的镜像 (已缓存)
  # ===========================================
  qwen-slm:
    # ✅ 复用 GLM-OCR 的镜像，不需要重新下载！
    image: lmsysorg/sglang:v0.4.3.post2-cu124
    container_name: spinedoc-qwen-slm
    restart: unless-stopped
    
    # GPU 配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # 端口配置 (30001 避免与 GLM-OCR 的 30000 冲突)
    ports:
      - "30001:30001"
    
    # volumes 配置 - 使用本地模型路径
    volumes:
      # 🚀 架构师：使用环境变量替换硬编码路径，支持跨机部署
      - ${LOCAL_MODEL_PATH:-E:/ai_models/Qwen2.5-1.5B-Instruct}:/app/models/qwen-1.5b
      # ModelScope 缓存
      - ${MODELSCOPE_CACHE:-C:/Users/qiuqiu/.cache/modelscope}:/root/.cache/modelscope
    
    # 环境变量
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
    
    # 启动命令 - 使用本地模型
    command: >
      python3 -m sglang.launch_server
      --model-path /app/models/qwen-1.5b
      --host 0.0.0.0
      --port 30001
      --context-length 4096
      --mem-fraction-static 0.4
      --tp 1
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
